name: Mirror to GitLab

on:
  # push:
  #   branches:
  #     - main # ВРЕМЕННО ОТКЛЮЧЕНО НА ЭТАПЕ РАЗРАБОТКИ
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USERNAME: ${{ secrets.GITLAB_USERNAME }}
        run: |
          git remote add gitlab https://${GITLAB_USERNAME}:${GITLAB_TOKEN}@gitlab.com/${GITLAB_USERNAME}/${{ github.event.repository.name }}.git
          git push -f gitlab main
          
      - name: Send Telegram Notification (Success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🦊 Зеркало на GitLab успешно обновлено!
            Мемориал '${{ github.event.repository.name }}' зарезервирован.
            Ссылка: https://gitlab.com/${{ secrets.GITLAB_USERNAME }}/${{ github.event.repository.name }}

      - name: Send Telegram Notification (Failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ ОШИБКА отправки на GitLab для '${{ github.event.repository.name }}'!
            Возможно, репозиторий на GitLab еще не создан или токен неверный.
